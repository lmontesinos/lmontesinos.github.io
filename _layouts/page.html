---
layout: default
---
<section class="page-header">
  <div class="container narrow">
    <p class="eyebrow">{{ page.eyebrow }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.subtitle %}
      <p class="subtitle">{{ page.subtitle }}</p>
    {% endif %}
  </div>
</section>

<section class="container narrow content">
  {{ content }}
</section>
